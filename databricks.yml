bundle:
  name: xome_langgraph_campaign

resources:
  apps:
    agent_xome_langgraph_campaign:
      name: "agent-xome-langgraph-campaign"
      description: "Xome Campaign Platform — LangGraph-powered personalized real estate email campaigns"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-server"]

      resources:
        - name: "sql_warehouse"
          sql_warehouse:
            id: "1f01d0f9de5b5108"
            permission: "CAN_USE"

  jobs:
    xome_setup_pipeline:
      name: "xome_setup_pipeline"
      tasks:
        - task_key: "generate_data"
          notebook_task:
            notebook_path: ./notebooks/01_generate_data.py

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    workspace:
      host: https://fevm-serverless-stable-14ey07.cloud.databricks.com
      profile: fevm
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    resources:
      apps:
        agent_xome_langgraph_campaign:
          name: agent-xome-langgraph-campaign
